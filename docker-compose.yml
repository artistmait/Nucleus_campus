services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nucleus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: "5000"
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: nucleus
      DB_PORT: "5432"
      JWT_SECRET: "change_me"
      EMAIL_USER: "change_me"
      EMAIL_PASS: "change_me"
      CLOUDINARY_NAME: "change_me"
      CLOUDINARY_API_KEY: "change_me"
      CLOUDINARY_SECRET_KEY: "change_me"
      GOOGLE_CLIENT_ID: "change_me"
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
